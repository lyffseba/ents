{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl">Lab: Level {{ phase }} • {{ pillar.upper() }} Pillar</h1>
<p class="text-green-400 oracle mt-1">{{ lore }}</p>

<form action="/lab/{{ phase }}/{{ pillar }}/submit" method="post" class="mt-6">
  <textarea name="code" class="w-full h-64 font-mono text-sm bg-black border border-green-800 p-4 rounded" placeholder="Your implementation...">{{ template_code }}</textarea>
  <button type="submit" class="mt-2 px-6 py-2 bg-green-600 rounded">🔮 Summon the Oracle (AI + Auto)</button>
</form>

<div id="result" class="mt-4 oracle text-sm hidden"></div>

<script>
async function handle(e) {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  const res = await fetch(form.action, {method:'POST', body: fd});
  const data = await res.json();
  const el = document.getElementById('result');
  el.innerHTML = `<pre class="p-3 bg-black/60 border border-green-900 rounded">${JSON.stringify(data, null, 2)}</pre>`;
  el.classList.remove('hidden');
}
document.querySelector('form').addEventListener('submit', handle);
</script>

<p class="mt-6 text-xs text-green-700">Pro: Full Gemini code review + custom hints. Download full workspace for local JAX/MLX/MAX/Mojo Oracle (pixi grademe.sh).</p>
{% endblock %}
